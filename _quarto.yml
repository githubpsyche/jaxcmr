project:
  type: website
  # OPTION A (no CI): render locally into docs/ for GitHub Pages
  output-dir: docs
  # pre-render: scripts/render-projects.sh
  resources:
    - "projects/*/index.html"
    - "projects/*/*_files/**"
  render:
    - index.qmd
    - posts/**/*.qmd
    - posts/**/*.ipynb
    - posts/**/*.md
    - projects/index.qmd
    - projects/first/index.qmd

website:
  title: "jaxcmr"
  site-url: https://jordangunn.github.io/jaxcmr
  navbar:
    left:
      - text: Posts
        href: posts/index.qmd
      - text: Projects
        menu:
          - text: Overview
            href: projects/index.qmd
          - text: Sample Paper
            href: projects/first/index.html
          - text: CRU to CMR
            href: projects/cru_to_cmr/index.html

format:
  html: default

# Optional: if you want KB wikilinks stripped/linked in includes
# filters:
#   - filters/wikilinks.lua
# wikilinks-mode: strip
