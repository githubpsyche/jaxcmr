project:
  type: website
  # OPTION A (no CI): render locally into docs/ for GitHub Pages
  output-dir: docs/home
  # pre-render: scripts/render-projects.sh
  resources:
    - "projects/*/index.html"
    - "projects/*/*_files/**"
  render:
    - index.qmd
    - posts/**/*.qmd

website:
  title: "jaxcmr"
  site-url: https://githubpsyche.github.io/jaxcmr
  navbar:
    left:
      - text: Posts
        href: posts/index.qmd
      - text: Projects
        menu:
          - text: CRU to CMR
            href: ../projects/cru_to_cmr/index.html
          - text: Thesis
            href: ../projects/thesis/index.html

format:
  html: 
    default: true
    theme: darkly

# Optional: if you want KB wikilinks stripped/linked in includes
# filters:
#   - filters/wikilinks.lua
# wikilinks-mode: strip
