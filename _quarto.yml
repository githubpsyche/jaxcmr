project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    - get-started/*.qmd
    - concepts/*.qmd
    - analyses/**/*.qmd
    - models/**/*.qmd
    - evaluation/*.qmd
    - workflow/*.qmd
    - projects/index.qmd
    - blog/**/*.qmd

website:
  title: "jaxcmr"
  description: "JAX-accelerated toolkit for computational memory research"
  site-url: https://githubpsyche.github.io/jaxcmr
  repo-url: https://github.com/githubpsyche/jaxcmr
  repo-actions: [edit, issue]

  navbar:
    background: dark
    left:
      - text: "Get Started"
        href: get-started/index.qmd
      - text: "Concepts"
        href: concepts/index.qmd
      - text: "Analyses"
        href: analyses/index.qmd
      - text: "Models"
        href: models/index.qmd
      - text: "Evaluation"
        href: evaluation/index.qmd
      - text: "Workflow"
        href: workflow/index.qmd
      - text: "Projects"
        href: projects/index.qmd
      - text: "Blog"
        href: blog/index.qmd
    right:
      - icon: github
        href: https://github.com/githubpsyche/jaxcmr

  sidebar:
    - title: "Get Started"
      contents:
        - get-started/index.qmd
        - get-started/quickstart.qmd

    - title: "Concepts"
      contents:
        - concepts/index.qmd
        - concepts/jax.qmd
        - concepts/data-format.qmd
        - concepts/architecture.qmd
        - concepts/evaluation-pipeline.qmd

    - title: "Analyses"
      contents:
        - analyses/index.qmd
        - analyses/importing-data.qmd
        - analyses/scoring-data.qmd
        - section: "Serial Position"
          contents:
            - analyses/serial-position/spc.qmd
            - analyses/serial-position/pnr.qmd
            - analyses/serial-position/srac.qmd
        - section: "Temporal Contiguity"
          contents:
            - analyses/temporal-contiguity/crp.qmd
            - analyses/temporal-contiguity/distcrp.qmd
        - section: "Category Effects"
          contents:
            - analyses/category/catcrp.qmd
            - analyses/category/cat-spc.qmd
        - section: "Repetition"
          contents:
            - analyses/repetition/repcrp.qmd
            - analyses/repetition/compound-cueing.qmd
        - section: "Error Analyses"
          contents:
            - analyses/error-analyses/intrusion.qmd
            - analyses/error-analyses/omission.qmd
        - analyses/custom-analyses.qmd

    - title: "Models"
      contents:
        - models/index.qmd
        - section: "Components"
          contents:
            - models/components/context.qmd
            - models/components/memory.qmd
            - models/components/termination.qmd
        - models/cmr.qmd
        - models/parameters.qmd
        - models/custom-models.qmd

    - title: "Evaluation"
      contents:
        - evaluation/index.qmd
        - evaluation/fitting.qmd
        - evaluation/simulation.qmd
        - evaluation/comparison.qmd

    - title: "Workflow"
      contents:
        - workflow/index.qmd
        - workflow/parameter-sensitivity.qmd
        - workflow/templates.qmd
        - workflow/papermill.qmd
        - workflow/research-tools.qmd

  page-footer:
    left: "Built with [Quarto](https://quarto.org/)"
    right: "jaxcmr"

  search:
    location: navbar
    type: overlay

format:
  html:
    theme: darkly
    toc: true
    toc-depth: 3
    code-fold: show
    code-tools: true
    code-copy: true

execute:
  freeze: auto

jupyter: python3
