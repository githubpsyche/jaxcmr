    - src/main/references.md

bibliography: references.bib

format:
  html:
    theme: cosmo
    code-fold: true
    toc: true
    number-sections: false

  pdf:
    csl: apa.csl
    author:
      - Jordan Gunn
      - Sean Polyn
    number-sections: false
    documentclass: scrreprt
    toc: true
    echo: false
    output: false # don't use notebook outputs in pdf figures
    keep-tex: true
    filters:
      - abstract-section
    #classoption:  12pt
    #linestretch: 2