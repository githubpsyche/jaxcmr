project:
  type: book
  output-dir: docs

book:
  title: "Project Name"
  output-file: "main"
  chapters:
    - index.md
    
    - part: src/main/00_index.md
      chapters:
        - src/main/01_introduction.md
    #   - src/main/01_Scrape_Replays.ipynb
    #   - src/main/02_Prepare_Spectator.ipynb
    #   - src/main/03_Record_Plays.ipynb

    - part: src/library/00_index.ipynb
      chapters:
        - src/library/01_example.ipynb
    #   - src/library/01_Data_Retrieval.ipynb
    #   - src/library/03_Timeline_Analysis.ipynb
    #   - src/library/04_Image_Processing.ipynb
