project:
  type: book
  output-dir: docs

book:
  title: "Project Name"
  output-file: "main"
  chapters:
    - index.md
    
    - part: src/main/00_index.md
      chapters:
        - src/main/01_introduction.md

    - part: src/library/00_index.ipynb
      chapters:
        - src/library/01_example.ipynb

    # - part: src/supplementary/00_index.ipynb
    #   chapters:
    #   - src/supplementary/Issues.todolist.md

    - src/main/references.md

bibliography: references.bib

format:
  html:
    theme: cosmo
    code-fold: true
    toc: true
    number-sections: false

  pdf:
    csl: apa.csl
    author:
      - Jordan Gunn
      - Sean Polyn
    number-sections: false
    documentclass: scrreprt
    toc: true
    echo: false
    output: false # don't use notebook outputs in pdf figures
    keep-tex: true
    filters:
      - abstract-section
    #classoption:  12pt
    #linestretch: 2