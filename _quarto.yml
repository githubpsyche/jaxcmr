project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    - docs_src/get-started/*.qmd
    - docs_src/concepts/*.qmd
    - docs_src/analyses/**/*.qmd
    - docs_src/models/*.qmd
    - docs_src/models/repetition/*.qmd
    - docs_src/models/semantic/*.qmd
    - docs_src/models/cru/*.qmd
    - docs_src/models/eeg/*.qmd
    - docs_src/evaluation/*.qmd
    - docs_src/evaluation/loss/*.qmd
    - docs_src/evaluation/fitting/*.qmd
    - docs_src/workflow/*.qmd
    - projects/index.qmd
    - docs_src/blog/**/*.qmd

website:
  title: "jaxcmr"
  description: "JAX-accelerated toolkit for computational memory research"
  site-url: https://githubpsyche.github.io/jaxcmr
  repo-url: https://github.com/githubpsyche/jaxcmr
  repo-actions: [edit, issue]

  navbar:
    background: dark
    left:
      - text: "Get Started"
        href: docs_src/get-started/index.qmd
      - text: "Concepts"
        href: docs_src/concepts/index.qmd
      - text: "Analyses"
        href: docs_src/analyses/index.qmd
      - text: "Models"
        href: docs_src/models/index.qmd
      - text: "Evaluation"
        href: docs_src/evaluation/index.qmd
      - text: "Workflow"
        href: docs_src/workflow/index.qmd
      - text: "Projects"
        href: projects/index.qmd
      - text: "Blog"
        href: docs_src/blog/index.qmd
    right:
      - icon: github
        href: https://github.com/githubpsyche/jaxcmr

  sidebar:
    - title: "Get Started"
      contents:
        - docs_src/get-started/index.qmd

    - title: "Concepts"
      contents:
        - docs_src/concepts/index.qmd
        - docs_src/concepts/jax.qmd
        - docs_src/concepts/data-format.qmd
        - docs_src/concepts/architecture.qmd
        - docs_src/concepts/evaluation-pipeline.qmd

    - title: "Analyses"
      contents:
        - docs_src/analyses/index.qmd
        - docs_src/analyses/importing-data.qmd
        - docs_src/analyses/scoring-data.qmd
        - section: "Serial Position"
          contents:
            - docs_src/analyses/serial-position/spc.qmd
            - docs_src/analyses/serial-position/pnr.qmd
        - section: "Temporal Contiguity"
          contents:
            - docs_src/analyses/temporal-contiguity/crp.qmd
        - section: "Category Effects"
          contents:
            - docs_src/analyses/category/catcrp.qmd
        - section: "Repetition"
          contents:
            - docs_src/analyses/repetition/repcrp.qmd
        - section: "Error Analyses"
          contents:
            - docs_src/analyses/error-analyses/intrusion.qmd
            - docs_src/analyses/error-analyses/omission.qmd
        - docs_src/analyses/custom-analyses.qmd

    - title: "Models"
      contents:
        - docs_src/models/index.qmd
        - section: "Baseline"
          contents:
            - docs_src/models/cmr.qmd
            - docs_src/models/context.qmd
            - docs_src/models/memory.qmd
        - docs_src/models/parameters.qmd
        - section: "Repetition Variants"
          contents:
            - docs_src/models/repetition/positional.qmd
            - docs_src/models/repetition/drift.qmd
            - docs_src/models/repetition/reinforcement.qmd
            - docs_src/models/repetition/outlist.qmd
            - docs_src/models/repetition/blend.qmd
            - docs_src/models/repetition/distinct.qmd
            - docs_src/models/repetition/no-reinstate.qmd
        - section: "Semantic Variants"
          contents:
            - docs_src/models/semantic/additive.qmd
            - docs_src/models/semantic/multiplicative.qmd
        - section: "CRU Variants"
          contents:
            - docs_src/models/cru/index.qmd
            - docs_src/models/cru/omnibus.qmd
            - docs_src/models/cru/cmr-compare.qmd
            - docs_src/models/cru/compterm.qmd
        - section: "EEG Variants"
          contents:
            - docs_src/models/eeg/index.qmd
            - docs_src/models/eeg/ecmr.qmd
            - docs_src/models/eeg/strength.qmd

    - title: "Evaluation"
      contents:
        - docs_src/evaluation/index.qmd
        - docs_src/evaluation/protocols.qmd
        - section: "Loss Functions"
          contents:
            - docs_src/evaluation/loss/index.qmd
            - docs_src/evaluation/loss/likelihood.qmd
            - docs_src/evaluation/loss/permutation.qmd
            - docs_src/evaluation/loss/mse.qmd
        - section: "Fitting"
          contents:
            - docs_src/evaluation/fitting/index.qmd
            - docs_src/evaluation/fitting/scipy-de.qmd
        - docs_src/evaluation/simulation.qmd
        - docs_src/evaluation/comparison.qmd

    - title: "Workflow"
      contents:
        - docs_src/workflow/index.qmd
        - docs_src/workflow/parameter-sensitivity.qmd

  page-footer:
    left: "Built with [Quarto](https://quarto.org/)"
    right: "jaxcmr"

  search:
    location: navbar
    type: overlay

format:
  html:
    theme: darkly
    toc: true
    toc-depth: 3
    code-fold: show
    code-tools: true
    code-copy: true

execute:
  freeze: auto

jupyter: python3
