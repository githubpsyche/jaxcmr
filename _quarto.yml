project:
  type: website
  output-dir: docs
  render:
    - index.ipynb
    - templates/**/*.ipynb

website:
  title: "jaxcmr"
  description: "JAX-accelerated toolkit for computational memory research"
  site-url: https://githubpsyche.github.io/jaxcmr
  repo-url: https://github.com/githubpsyche/jaxcmr
  repo-actions: [edit, issue]

  navbar:
    background: dark
    left:
      - text: "Guide"
        href: templates/guide/index.ipynb
      - text: "Analyses"
        href: templates/index.ipynb
      - text: "Models"
        href: templates/models/index.ipynb
      - text: "Evaluation"
        href: templates/evaluation/index.ipynb
      - text: "Workflow"
        href: templates/workflow/index.ipynb
    right:
      - icon: github
        href: https://github.com/githubpsyche/jaxcmr

  sidebar:
    - title: "Guide"
      contents:
        - templates/guide/index.ipynb
        - templates/guide/jax.ipynb
        - templates/guide/data-format.ipynb
        - templates/guide/architecture.ipynb
        - templates/guide/evaluation-pipeline.ipynb

    - title: "Analyses"
      contents:
        - templates/index.ipynb
        - templates/importing-data.ipynb
        - templates/scoring-data.ipynb
        - section: "Serial Position"
          contents:
            - templates/spc.ipynb
            - templates/pnr.ipynb
        - section: "Temporal Contiguity"
          contents:
            - templates/crp.ipynb
            - templates/conditional_crp.ipynb
            - templates/lagrank.ipynb
        - section: "Category Effects"
          contents:
            - templates/catcrp.ipynb
            - templates/cat_spc.ipynb
            - templates/cat_lpp_spc.ipynb
            - templates/cat_lpp_by_recall.ipynb
            - templates/cat_recall_by_lpp.ipynb
        - section: "Repetition"
          contents:
            - templates/repcrp.ipynb
            - templates/serialrepcrp.ipynb
            - templates/repneighborcrp.ipynb
            - templates/replagrank.ipynb
            - templates/serialreplagrank.ipynb
            - templates/repsrac.ipynb
            - templates/rpl.ipynb
        - section: "Error Analyses"
          contents:
            - templates/intrusion_error_rate.ipynb
            - templates/omission_error_rate.ipynb
            - templates/order_error_rate.ipynb
            - templates/termination_probability.ipynb
        - section: "Semantic"
          contents:
            - templates/distcrp.ipynb
            - templates/conditional_distcrp.ipynb
            - templates/srac.ipynb
            - templates/relative_srac.ipynb
        - section: "Co-Recall"
          contents:
            - templates/conditional_corec_by_lag.ipynb
            - templates/conditional_corec_by_cat.ipynb
            - templates/joint_corec_by_lag.ipynb
            - templates/compound_cueing.ipynb
        - section: "Cue-Centered"
          contents:
            - templates/cue_centered_crp.ipynb
            - templates/cue_centered_lagrank.ipynb
        - section: "Other"
          contents:
            - templates/nth_item_recall.ipynb
            - templates/log_odds_crp.ipynb
        - templates/custom-analyses.ipynb

    - title: "Models"
      contents:
        - templates/models/index.ipynb
        - section: "Baseline"
          contents:
            - templates/models/cmr.ipynb
            - templates/models/context.ipynb
            - templates/models/linear_memory.ipynb
        - templates/models/parameters.ipynb
        - section: "Repetition Variants"
          contents:
            - templates/models/repetition/positional.ipynb
            - templates/models/repetition/drift.ipynb
            - templates/models/repetition/reinforcement.ipynb
            - templates/models/repetition/outlist.ipynb
            - templates/models/repetition/blend.ipynb
            - templates/models/repetition/distinct.ipynb
            - templates/models/repetition/no-reinstate.ipynb
        - section: "Semantic Variants"
          contents:
            - templates/models/semantic/additive.ipynb
            - templates/models/semantic/multiplicative.ipynb

    - title: "Evaluation"
      contents:
        - templates/evaluation/index.ipynb
        - templates/evaluation/protocols.ipynb
        - section: "Loss Functions"
          contents:
            - templates/evaluation/loss/index.ipynb
            - templates/evaluation/loss/likelihood.ipynb
            - templates/evaluation/loss/permutation.ipynb
            - templates/evaluation/loss/mse.ipynb
        - section: "Fitting"
          contents:
            - templates/evaluation/fitting/index.ipynb
            - templates/evaluation/fitting/scipy-de.ipynb
            - templates/evaluation/fitting.ipynb
        - templates/evaluation/parameter_shifting.ipynb
        - templates/evaluation/compare_simulation_loss.ipynb

    - title: "Workflow"
      contents:
        - templates/workflow/index.ipynb

  page-footer:
    left: "Built with [Quarto](https://quarto.org/)"
    right: "jaxcmr"

  search:
    location: navbar
    type: overlay

format:
  html:
    theme: darkly
    toc: true
    toc-depth: 3
    code-fold: show
    code-tools: true
    code-copy: true

execute:
  enabled: false

jupyter: python3
