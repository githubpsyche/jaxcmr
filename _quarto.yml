project:
  type: website
  output-dir: docs
  render:
    - index.ipynb
    - notebooks/**/*.ipynb
    - notebooks/index.qmd
    - blog/**/*.qmd

website:
  title: "jaxcmr"
  description: "JAX-accelerated toolkit for computational memory research"
  site-url: https://githubpsyche.github.io/jaxcmr
  repo-url: https://github.com/githubpsyche/jaxcmr
  repo-actions: [edit, issue]

  navbar:
    background: dark
    left:
      - text: "Guide"
        href: notebooks/guide/index.ipynb
      - text: "Analyses"
        href: notebooks/analyses/index.ipynb
      - text: "Models"
        href: notebooks/models/index.ipynb
      - text: "Evaluation"
        href: notebooks/evaluation/index.ipynb
      - text: "Workflow"
        href: notebooks/workflow/index.ipynb
      - text: "Projects"
        href: notebooks/index.qmd
      - text: "Blog"
        href: blog/index.qmd
    right:
      - icon: github
        href: https://github.com/githubpsyche/jaxcmr

  sidebar:
    - title: "Guide"
      contents:
        - notebooks/guide/index.ipynb
        - notebooks/guide/jax.ipynb
        - notebooks/guide/data-format.ipynb
        - notebooks/guide/architecture.ipynb
        - notebooks/guide/evaluation-pipeline.ipynb

    - title: "Analyses"
      contents:
        - notebooks/analyses/index.ipynb
        - notebooks/analyses/importing-data.ipynb
        - notebooks/analyses/scoring-data.ipynb
        - section: "Serial Position"
          contents:
            - notebooks/analyses/serial-position/spc.ipynb
            - notebooks/analyses/serial-position/pnr.ipynb
        - section: "Temporal Contiguity"
          contents:
            - notebooks/analyses/temporal-contiguity/crp.ipynb
        - section: "Category Effects"
          contents:
            - notebooks/analyses/category/catcrp.ipynb
            - notebooks/analyses/category/cat_spc.ipynb
        - section: "Repetition"
          contents:
            - notebooks/analyses/repetition/repcrp.ipynb
            - notebooks/analyses/repetition/backrepcrp.ipynb
            - notebooks/analyses/repetition/serialrepcrp.ipynb
            - notebooks/analyses/repetition/repneighborcrp.ipynb
        - section: "Error Analyses"
          contents:
            - notebooks/analyses/error/intrusion_error_rate.ipynb
            - notebooks/analyses/error/omission_error_rate.ipynb
            - notebooks/analyses/error/order_error_rate.ipynb
            - notebooks/analyses/error/termination_probability.ipynb
        - section: "Semantic"
          contents:
            - notebooks/analyses/semantic/distcrp.ipynb
            - notebooks/analyses/semantic/srac.ipynb
            - notebooks/analyses/semantic/relative_srac.ipynb
        - section: "Co-Recall"
          contents:
            - notebooks/analyses/co-recall/conditional_corec_by_lag.ipynb
            - notebooks/analyses/co-recall/conditional_corec_by_cat.ipynb
            - notebooks/analyses/co-recall/joint_corec_by_lag.ipynb
            - notebooks/analyses/co-recall/compound_cueing.ipynb
        - section: "EEG"
          contents:
            - notebooks/analyses/eeg/cat_lpp_spc.ipynb
            - notebooks/analyses/eeg/cat_lpp_by_recall.ipynb
            - notebooks/analyses/eeg/cat_recall_by_lpp.ipynb
        - section: "Other"
          contents:
            - notebooks/analyses/other/nth_item_recall.ipynb
            - notebooks/analyses/other/rpl.ipynb
            - notebooks/analyses/other/log_odds_crp.ipynb
        - notebooks/analyses/custom-analyses.ipynb

    - title: "Models"
      contents:
        - notebooks/models/index.ipynb
        - section: "Baseline"
          contents:
            - notebooks/models/cmr.ipynb
            - notebooks/models/context.ipynb
            - notebooks/models/linear_memory.ipynb
        - notebooks/models/parameters.ipynb
        - section: "Repetition Variants"
          contents:
            - notebooks/models/repetition/positional.ipynb
            - notebooks/models/repetition/drift.ipynb
            - notebooks/models/repetition/reinforcement.ipynb
            - notebooks/models/repetition/outlist.ipynb
            - notebooks/models/repetition/blend.ipynb
            - notebooks/models/repetition/distinct.ipynb
            - notebooks/models/repetition/no-reinstate.ipynb
        - section: "Semantic Variants"
          contents:
            - notebooks/models/semantic/additive.ipynb
            - notebooks/models/semantic/multiplicative.ipynb
        - section: "CRU Variants"
          contents:
            - notebooks/models/cru/index.ipynb
            - notebooks/models/cru/omnibus.ipynb
            - notebooks/models/cru/cmr-compare.ipynb
            - notebooks/models/cru/compterm.ipynb
        - section: "EEG Variants"
          contents:
            - notebooks/models/eeg/index.ipynb
            - notebooks/models/eeg/ecmr.ipynb
            - notebooks/models/eeg/strength.ipynb

    - title: "Evaluation"
      contents:
        - notebooks/evaluation/index.ipynb
        - notebooks/evaluation/protocols.ipynb
        - section: "Loss Functions"
          contents:
            - notebooks/evaluation/loss/index.ipynb
            - notebooks/evaluation/loss/likelihood.ipynb
            - notebooks/evaluation/loss/permutation.ipynb
            - notebooks/evaluation/loss/mse.ipynb
        - section: "Fitting"
          contents:
            - notebooks/evaluation/fitting/index.ipynb
            - notebooks/evaluation/fitting/scipy-de.ipynb
            - notebooks/evaluation/fitting.ipynb
        - notebooks/evaluation/parameter_shifting.ipynb
        - notebooks/evaluation/compare_simulation_loss.ipynb
        - notebooks/evaluation/selective_interference.ipynb

    - title: "Workflow"
      contents:
        - notebooks/workflow/index.ipynb

  page-footer:
    left: "Built with [Quarto](https://quarto.org/)"
    right: "jaxcmr"

  search:
    location: navbar
    type: overlay

format:
  html:
    theme: darkly
    toc: true
    toc-depth: 3
    code-fold: show
    code-tools: true
    code-copy: true

execute:
  freeze: auto

jupyter: python3
