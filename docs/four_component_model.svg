<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 680" width="760" height="680" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#444"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#2C5F8A"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#8A2C2C"/>
    </marker>
  </defs>

  <rect width="760" height="680" fill="white"/>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" fill="#222" font-size="21" font-weight="bold">Four-Component Retrieved-Context Model</text>

  <!-- ============ NODES ============ -->
  <!-- Left column center: 170, Right column center: 590 -->
  <!-- Top row y: 80-140, Bottom row y: 460-520 -->

  <rect x="75" y="80" width="190" height="60" rx="10" fill="#4A90D9" stroke="#2C5F8A" stroke-width="2"/>
  <text x="170" y="116" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Object Features</text>

  <rect x="495" y="80" width="190" height="60" rx="10" fill="#D94A4A" stroke="#8A2C2C" stroke-width="2"/>
  <text x="590" y="116" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Event Features</text>

  <rect x="75" y="460" width="190" height="60" rx="10" fill="#5BA5D9" stroke="#2C5F8A" stroke-width="2"/>
  <text x="170" y="496" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Object Context</text>

  <rect x="495" y="460" width="190" height="60" rx="10" fill="#D97A7A" stroke="#8A2C2C" stroke-width="2"/>
  <text x="590" y="496" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Event Context</text>

  <!-- ============ 1. F_obj <-> C_obj (left, vertical) ============ -->
  <line x1="120" y1="140" x2="120" y2="460" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="220" y1="460" x2="220" y2="140" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Label centered between the two lines -->
  <rect x="112" y="274" width="116" height="74" rx="4" fill="white" fill-opacity="0.94"/>
  <text x="170" y="292" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">Object</text>
  <text x="170" y="308" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">MFC / MCF</text>
  <text x="170" y="328" text-anchor="middle" fill="#555" font-size="11" font-style="italic">Object-level</text>
  <text x="170" y="342" text-anchor="middle" fill="#555" font-size="11" font-style="italic">order signal</text>

  <!-- ============ 2. F_evt <-> C_evt (right, vertical) ============ -->
  <line x1="540" y1="140" x2="540" y2="460" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="640" y1="460" x2="640" y2="140" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Label centered between the two lines -->
  <rect x="532" y="274" width="116" height="74" rx="4" fill="white" fill-opacity="0.94"/>
  <text x="590" y="292" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">Event</text>
  <text x="590" y="308" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">MFC / MCF</text>
  <text x="590" y="328" text-anchor="middle" fill="#555" font-size="11" font-style="italic">Event-level</text>
  <text x="590" y="342" text-anchor="middle" fill="#555" font-size="11" font-style="italic">order signal</text>

  <!-- ============ 3. F_obj <-> C_evt (diagonal TL-BR, blue) ============ -->
  <!-- Two lines offset by ~25px perpendicular to the diagonal -->
  <line x1="258" y1="140" x2="502" y2="460" stroke="#2C5F8A" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <line x1="520" y1="460" x2="276" y2="140" stroke="#2C5F8A" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <!-- Label: row-aligned with red label, on the blue diagonal (~x=467 at y=395) -->
  <rect x="392" y="386" width="150" height="22" rx="4" fill="white" fill-opacity="0.93"/>
  <text x="467" y="403" text-anchor="middle" fill="#2C5F8A" font-size="12" font-style="italic">Recover event elements</text>

  <!-- ============ 4. F_evt <-> C_obj (diagonal TR-BL, red) ============ -->
  <line x1="502" y1="140" x2="258" y2="460" stroke="#8A2C2C" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <line x1="240" y1="460" x2="484" y2="140" stroke="#8A2C2C" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <!-- Label: lower left quadrant -->
  <rect x="194" y="386" width="150" height="22" rx="4" fill="white" fill-opacity="0.93"/>
  <text x="269" y="403" text-anchor="middle" fill="#8A2C2C" font-size="12" font-style="italic">Recover event identity</text>

  <!-- ============ 5. F_obj <-> F_evt (top, absent) ============ -->
  <line x1="265" y1="98" x2="495" y2="98" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="265" y1="122" x2="495" y2="122" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="372" y1="92" x2="388" y2="128" stroke="#C44" stroke-width="3"/>
  <line x1="388" y1="92" x2="372" y2="128" stroke="#C44" stroke-width="3"/>
  <text x="380" y="72" text-anchor="middle" fill="#999" font-size="11" font-style="italic">No direct route</text>

  <!-- ============ 6. C_obj <-> C_evt (bottom, absent) ============ -->
  <line x1="265" y1="478" x2="495" y2="478" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="265" y1="502" x2="495" y2="502" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="372" y1="472" x2="388" y2="508" stroke="#C44" stroke-width="3"/>
  <line x1="388" y1="472" x2="372" y2="508" stroke="#C44" stroke-width="3"/>
  <text x="380" y="546" text-anchor="middle" fill="#999" font-size="11" font-style="italic">No direct route</text>

  <!-- ============ TIMESCALE ============ -->
  <text x="170" y="574" text-anchor="middle" fill="#2C5F8A" font-size="14" font-weight="bold">Updates every item</text>
  <text x="590" y="574" text-anchor="middle" fill="#8A2C2C" font-size="14" font-weight="bold">Updates every event</text>

  <!-- Subtitle -->
  <text x="380" y="624" text-anchor="middle" fill="#777" font-size="12">Without event cues, object-level associations favor within-event order judgments.</text>
  <text x="380" y="642" text-anchor="middle" fill="#777" font-size="12">With event cues, event-level comparison reverses this advantage.</text>
</svg>
