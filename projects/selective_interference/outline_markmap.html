","lines":"56,58"}}],"payload":{"tag":"ul","lines":"54,58"}},{"content":"","children":[{"content":"Recent meta-analyses on visuospatial interventions and intrusive memories (mixed effect sizes; stronger for certain designs).","children":[],"payload":{"tag":"li","lines":"60,61"}},{"content":"Multisite/preregistered replication attempts that report either (A) robust immediate or lab-based effects in some conditions, or (B) weaker or absent effects on long-term diary intrusions in others.","children":[],"payload":{"tag":"li","lines":"61,63"}}],"payload":{"tag":"ul","lines":"60,63"}}],"payload":{"tag":"h2","lines":"41,42"}},{"content":"Existing theoretical accounts","children":[{"content":"Visuospatial working-memory interference / consolidation accounts","children":[{"content":"","children":[{"content":"Provides a straightforward cognitive mechanism grounded in dual-task interference and WM resource theories.","children":[],"payload":{"tag":"li","lines":"82,83"}},{"content":"Naturally explains why visuospatial tasks often outperform purely verbal tasks at reducing intrusive imagery.","children":[],"payload":{"tag":"li","lines":"83,85"}}],"payload":{"tag":"ul","lines":"82,85"}},{"content":"","children":[{"content":"The route from transient WM load to long-term episodic consolidation is underspecified and not formalised in a retrieval model, making task-specific predictions limited.","children":[],"payload":{"tag":"li","lines":"87,88"}},{"content":"It does not, by itself, explain spared recognition/free recall or heterogeneous findings (e.g., mixed diary effects, some non-visuospatial interventions) without additional assumptions.","children":[],"payload":{"tag":"li","lines":"88,90"}}],"payload":{"tag":"ul","lines":"87,90"}}],"payload":{"tag":"h3","lines":"72,73"}},{"content":"Dual-representation / separate trace theories","children":[{"content":"","children":[{"content":"Fits clinical phenomenology of vivid, sensory intrusions coexisting with more coherent narratives, and offers a clear conceptual dissociation between intrusive and voluntary memory.","children":[],"payload":{"tag":"li","lines":"100,101"}},{"content":"Has been influential in framing imagery-focused treatments and in motivating hypotheses about selective effects on &quot;flashback&quot; memory.","children":[],"payload":{"tag":"li","lines":"101,103"}}],"payload":{"tag":"ul","lines":"100,103"}},{"content":"","children":[{"content":"The two-trace architecture is rarely embedded in a detailed retrieval model: it is unclear how the traces interact during particular tasks (free recall, recognition, cue-driven intrusion tasks).","children":[],"payload":{"tag":"li","lines":"105,106"}},{"content":"It is often post hoc which phenomena are attributed to which trace, and what exactly an intervention like Tetris does at the representational level (e.g., weakens sensory traces is rarely operationalised).","children":[],"payload":{"tag":"li","lines":"106,108"}}],"payload":{"tag":"ul","lines":"105,108"}}],"payload":{"tag":"h3","lines":"90,91"}},{"content":"Reconsolidation-based accounts","children":[{"content":"","children":[{"content":"Ties behavioural effects to a broader neurobiological literature on reconsolidation and updating, providing a principled role for reminders and precise timing.","children":[],"payload":{"tag":"li","lines":"118,119"}},{"content":"Offers a way to explain effects of delayed reminder+Tetris protocols that occur after initial consolidation.","children":[],"payload":{"tag":"li","lines":"119,121"}}],"payload":{"tag":"ul","lines":"118,121"}},{"content":"","children":[{"content":"Evidence that these human paradigms genuinely tap reconsolidation (rather than standard re-encoding in a new context) is indirect, and the computational story remains largely verbal.","children":[],"payload":{"tag":"li","lines":"123,124"}},{"content":"Reconsolidation windows and boundary conditions are debated, and several patterns (including mixed replication success) can plausibly be captured by simpler context-binding and competition mechanisms.","children":[],"payload":{"tag":"li","lines":"124,126"}}],"payload":{"tag":"ul","lines":"123,126"}}],"payload":{"tag":"h3","lines":"108,109"}},{"content":"Retrieved-context theory / CMR3 (single-system alternative)","children":[{"content":"","children":[{"content":"Provides a fully specified computational model that already accounts for wide-ranging memory phenomena and incorporates valence/arousal, allowing explicit simulations rather than purely verbal theorising.","children":[],"payload":{"tag":"li","lines":"136,137"}},{"content":"Explains intrusive vs voluntary dissociations via retrieval mode and control within a single system, without needing separate traces or a dedicated visuospatial module.","children":[],"payload":{"tag":"li","lines":"137,139"}}],"payload":{"tag":"ul","lines":"136,139"}},{"content":"","children":[{"content":"The model is abstract and parameter-rich; without clear constraints there is a risk of flexibility, and mapping to neural implementation is non-trivial.","children":[],"payload":{"tag":"li","lines":"141,142"}},{"content":"CMR3 has not yet been applied directly to address unintentional recall or trauma-film/Tetris paradigms, so this project would be the first serious test of whether its mechanisms can capture the involuntary/voluntary distinction, selective interference findings, and applicable boundary conditions.","children":[],"payload":{"tag":"li","lines":"142,144"}}],"payload":{"tag":"ul","lines":"141,144"}}],"payload":{"tag":"h3","lines":"126,127"}}],"payload":{"tag":"h2","lines":"68,69"}},{"content":"The retrieved-context / CMR3 framework","children":[{"content":"Overview and Basic Architecture","children":[{"content":"Slowly drifting context vectors with temporal, semantic, and emotional components.","children":[],"payload":{"tag":"li","lines":"152,153"}},{"content":"Encoding of context&#x2192;item and item&#x2192;context associations.","children":[],"payload":{
