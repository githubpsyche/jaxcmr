<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 380" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">

  <!-- Divider -->
  <line x1="550" y1="15" x2="550" y2="370" stroke="#555" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Panel headers -->
  <text x="275" y="28" text-anchor="middle" fill="#ccc" font-size="14" font-style="italic">Normal memory</text>
  <text x="825" y="28" text-anchor="middle" fill="#ccc" font-size="14" font-style="italic">Trauma memory</text>

  <!-- ============ LEFT PANEL — Normal ============ -->

  <!-- Cue box -->
  <rect x="215" y="42" width="120" height="34" rx="4" fill="#666" stroke="#999" stroke-width="1.5"/>
  <text x="275" y="64" text-anchor="middle" fill="white" font-size="12" font-weight="500">Cue</text>

  <!-- Lines: Cue → Hippocampal trace -->
  <line x1="275" y1="76" x2="275" y2="120" stroke="#999" stroke-width="2"/>

  <!-- Lines: Hippocampal trace → output nodes -->
  <line x1="220" y1="175" x2="120" y2="255" stroke="#999" stroke-width="1.5"/>
  <line x1="250" y1="182" x2="220" y2="255" stroke="#999" stroke-width="1.5"/>
  <line x1="300" y1="182" x2="330" y2="255" stroke="#999" stroke-width="1.5"/>
  <line x1="330" y1="175" x2="430" y2="255" stroke="#999" stroke-width="1.5"/>

  <!-- Hippocampal trace — HUB (drawn after lines) -->
  <circle cx="275" cy="155" r="38" fill="#555" stroke="#999" stroke-width="2"/>
  <text x="275" y="150" text-anchor="middle" fill="white" font-size="10" font-weight="500">Hippocampal</text>
  <text x="275" y="163" text-anchor="middle" fill="white" font-size="10" font-weight="500">trace</text>

  <!-- Output nodes -->
  <circle cx="120" cy="285" r="30" fill="#555" stroke="#999" stroke-width="1.5"/>
  <text x="120" y="282" text-anchor="middle" fill="white" font-size="9.5" font-weight="500">Sensory</text>
  <text x="120" y="294" text-anchor="middle" fill="white" font-size="9.5" font-weight="500">details</text>

  <circle cx="220" cy="285" r="30" fill="#555" stroke="#999" stroke-width="1.5"/>
  <text x="220" y="289" text-anchor="middle" fill="white" font-size="10" font-weight="500">Emotion</text>

  <circle cx="330" cy="285" r="30" fill="#555" stroke="#999" stroke-width="1.5"/>
  <text x="330" y="289" text-anchor="middle" fill="white" font-size="10" font-weight="500">Semantics</text>

  <circle cx="430" cy="285" r="30" fill="#555" stroke="#999" stroke-width="1.5"/>
  <text x="430" y="282" text-anchor="middle" fill="white" font-size="9.5" font-weight="500">Space,</text>
  <text x="430" y="294" text-anchor="middle" fill="white" font-size="9.5" font-weight="500">time</text>

  <!-- ============ RIGHT PANEL — Trauma ============ -->

  <!-- Cue box -->
  <rect x="765" y="42" width="120" height="34" rx="4" fill="#666" stroke="#999" stroke-width="1.5"/>
  <text x="825" y="64" text-anchor="middle" fill="white" font-size="12" font-weight="500">Cue</text>

  <!-- Lines: Cue → Hippocampal trace (weakened) -->
  <line x1="825" y1="76" x2="825" y2="120" stroke="#666" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Lines: Hippocampal trace → Sensory, Emotion — STRENGTHENED -->
  <line x1="770" y1="175" x2="670" y2="255" stroke="#c0392b" stroke-width="3"/>
  <line x1="800" y1="182" x2="770" y2="255" stroke="#c0392b" stroke-width="3"/>

  <!-- Lines: Hippocampal trace → Semantics, Space,time — WEAKENED -->
  <line x1="850" y1="182" x2="880" y2="255" stroke="#666" stroke-width="1.0" stroke-dasharray="5,3"/>
  <line x1="880" y1="175" x2="980" y2="255" stroke="#666" stroke-width="1.0" stroke-dasharray="5,3"/>

  <!-- Hippocampal trace — HUB (weakened) -->
  <circle cx="825" cy="155" r="38" fill="#3a3a3a" stroke="#777" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="825" y="150" text-anchor="middle" fill="#888" font-size="10" font-weight="500">Hippocampal</text>
  <text x="825" y="163" text-anchor="middle" fill="#888" font-size="10" font-weight="500">trace</text>

  <!-- Output nodes — Sensory and Emotion: STRENGTHENED -->
  <circle cx="670" cy="285" r="34" fill="#c0392b" stroke="#e74c3c" stroke-width="2"/>
  <text x="670" y="282" text-anchor="middle" fill="white" font-size="10" font-weight="600">Sensory</text>
  <text x="670" y="294" text-anchor="middle" fill="white" font-size="10" font-weight="600">details</text>

  <circle cx="770" cy="285" r="34" fill="#c0392b" stroke="#e74c3c" stroke-width="2"/>
  <text x="770" y="289" text-anchor="middle" fill="white" font-size="10" font-weight="600">Emotion</text>

  <!-- Output nodes — Semantics and Space,time: WEAKENED -->
  <circle cx="880" cy="285" r="30" fill="#3a3a3a" stroke="#777" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="880" y="289" text-anchor="middle" fill="#888" font-size="10" font-weight="500">Semantics</text>

  <circle cx="980" cy="285" r="30" fill="#3a3a3a" stroke="#777" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="980" y="282" text-anchor="middle" fill="#888" font-size="9.5" font-weight="500">Space,</text>
  <text x="980" y="294" text-anchor="middle" fill="#888" font-size="9.5" font-weight="500">time</text>

</svg>
