<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 280" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">

  <!-- Timeline arrow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
  </defs>
  <line x1="30" y1="195" x2="1090" y2="195" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Phase 1: Encode (stacked IV: emotional vs neutral) — red/blue -->
  <rect x="40" y="100" width="140" height="42" rx="4" fill="#c0392b"/>
  <text x="110" y="126" text-anchor="middle" fill="white" font-size="13" font-weight="500">Emotional film</text>
  <rect x="40" y="148" width="140" height="42" rx="4" fill="#2978b5"/>
  <text x="110" y="174" text-anchor="middle" fill="white" font-size="13" font-weight="500">Neutral film</text>
  <text x="110" y="82" text-anchor="middle" fill="#ccc" font-size="11" font-style="italic">Condition</text>

  <!-- Phase 2: Delay 1 -->
  <rect x="205" y="124" width="80" height="42" rx="4" fill="#555" stroke="#777" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="245" y="142" text-anchor="middle" fill="#ccc" font-size="11" font-weight="500">Structured</text>
  <text x="245" y="157" text-anchor="middle" fill="#ccc" font-size="11" font-weight="500">Break</text>

  <!-- Phase 3: Reminder cues -->
  <rect x="310" y="124" width="105" height="42" rx="4" fill="#7f8c8d"/>
  <text x="363" y="150" text-anchor="middle" fill="white" font-size="13" font-weight="500">Reminder cues</text>

  <!-- Phase 4: Interference (stacked IV: visuospatial vs control) — teal tones -->
  <rect x="440" y="100" width="145" height="42" rx="4" fill="#1a8a6e"/>
  <text x="513" y="126" text-anchor="middle" fill="white" font-size="13" font-weight="500">Visuospatial task</text>
  <rect x="440" y="148" width="145" height="42" rx="4" fill="#5bbf9e"/>
  <text x="513" y="174" text-anchor="middle" fill="white" font-size="13" font-weight="500">Control</text>
  <text x="513" y="82" text-anchor="middle" fill="#ccc" font-size="11" font-style="italic">Intervention</text>

  <!-- Phase 5: Delay 2 -->
  <rect x="610" y="124" width="80" height="42" rx="4" fill="#555" stroke="#777" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="650" y="150" text-anchor="middle" fill="#ccc" font-size="13" font-weight="500">Filler?</text>

  <!-- Phase 6: Test (stacked IV: retrieval mode) — purple tones -->
  <rect x="715" y="100" width="145" height="42" rx="4" fill="#6a4c93"/>
  <text x="788" y="126" text-anchor="middle" fill="white" font-size="13" font-weight="500">Involuntary</text>
  <rect x="715" y="148" width="145" height="42" rx="4" fill="#9b7abf"/>
  <text x="788" y="174" text-anchor="middle" fill="white" font-size="13" font-weight="500">Voluntary</text>
  <text x="788" y="82" text-anchor="middle" fill="#ccc" font-size="11" font-style="italic">Retrieval mode</text>

  <!-- Result annotation — orange/white to avoid IV color overlap -->
  <rect x="900" y="100" width="12" height="42" rx="2" fill="#e67e22" opacity="0.9"/>
  <rect x="900" y="148" width="12" height="42" rx="2" fill="#ecf0f1" opacity="0.9"/>
  <text x="925" y="126" fill="#e67e22" font-size="11" font-weight="500">Impaired</text>
  <text x="925" y="174" fill="#ecf0f1" font-size="11" font-weight="500">Spared</text>

  <!-- Time labels -->
  <text x="110" y="215" text-anchor="middle" fill="#999" font-size="11">Encoding</text>
  <text x="245" y="215" text-anchor="middle" fill="#999" font-size="11">Delay</text>
  <text x="363" y="215" text-anchor="middle" fill="#999" font-size="11">Reminder</text>
  <text x="513" y="215" text-anchor="middle" fill="#999" font-size="11">Interference</text>
  <text x="650" y="215" text-anchor="middle" fill="#999" font-size="11">Delay</text>
  <text x="788" y="215" text-anchor="middle" fill="#999" font-size="11">Test</text>

</svg>
