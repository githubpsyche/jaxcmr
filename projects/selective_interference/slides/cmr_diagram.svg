<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 320" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">

  <!-- ========== SHARED MEMORY STRIP ========== -->

  <!-- Title -->
  <text x="550" y="12" text-anchor="middle" fill="#ccc" font-size="13">Context–item associations</text>

  <!-- Region labels -->
  <text x="370" y="24" text-anchor="middle" fill="#999" font-size="11">Film region</text>
  <text x="730" y="24" text-anchor="middle" fill="#999" font-size="11">Interference region</text>

  <!-- Strip background -->
  <rect x="80" y="30" width="940" height="48" rx="4" fill="none" stroke="#666" stroke-width="1"/>

  <!-- Context axis -->
  <line x1="90" y1="60" x2="1010" y2="60" stroke="#666" stroke-width="1"/>

  <!-- Shared context zone -->
  <rect x="465" y="34" width="170" height="40" rx="2" fill="#e67e22" opacity="0.20" stroke="#e67e22" stroke-width="1.5"/>
  <text x="550" y="44" text-anchor="middle" fill="#e67e22" font-size="9">shared context</text>

  <!-- Film items -->
  <circle cx="290" cy="54" r="11" fill="#555" stroke="#999" stroke-width="1.5"/>
  <text x="290" y="57" text-anchor="middle" fill="white" font-size="7">F₁</text>
  <circle cx="370" cy="54" r="11" fill="#555" stroke="#999" stroke-width="1.5"/>
  <text x="370" y="57" text-anchor="middle" fill="white" font-size="7">F₂</text>
  <circle cx="450" cy="54" r="11" fill="#555" stroke="#999" stroke-width="1.5"/>
  <text x="450" y="57" text-anchor="middle" fill="white" font-size="7">F₃</text>

  <!-- Competitor items -->
  <circle cx="650" cy="54" r="11" fill="#e67e22" stroke="#d35400" stroke-width="1.5"/>
  <text x="650" y="57" text-anchor="middle" fill="white" font-size="7">C₁</text>
  <circle cx="730" cy="54" r="11" fill="#e67e22" stroke="#d35400" stroke-width="1.5"/>
  <text x="730" y="57" text-anchor="middle" fill="white" font-size="7">C₂</text>
  <circle cx="810" cy="54" r="11" fill="#e67e22" stroke="#d35400" stroke-width="1.5"/>
  <text x="810" y="57" text-anchor="middle" fill="white" font-size="7">C₃</text>

  <!-- ========== DIVIDER ========== -->

  <line x1="550" y1="86" x2="550" y2="370" stroke="#555" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ========== PANEL HEADERS ========== -->

  <text x="280" y="96" text-anchor="middle" fill="#ccc" font-size="14" font-style="italic">Voluntary recall</text>
  <text x="820" y="96" text-anchor="middle" fill="#ccc" font-size="14" font-style="italic">Involuntary recall</text>

  <!-- ========== LEFT PANEL — Voluntary ========== -->

  <!-- Spotlight -->
  <rect x="160" y="106" width="240" height="22" rx="11" fill="#2978b5" opacity="0.15" stroke="#2978b5" stroke-width="1.5"/>
  <text x="280" y="120" text-anchor="middle" fill="#2978b5" font-size="10" font-weight="500">Reinstated start-of-film context</text>

  <!-- Arrow down -->
  <line x1="280" y1="128" x2="280" y2="144" stroke="#999" stroke-width="1.2"/>
  <polygon points="276,144 280,152 284,144" fill="#999"/>

  <!-- Activation bars — primacy gradient (F₁ > F₂ > F₃) -->
  <!-- F₁:x=181 F₂:x=214 F₃:x=247 | C₁:x=285 C₂:x=318 C₃:x=351 -->
  <!-- Baseline y=195. F₁ tallest (closest to start-of-film context) -->

  <rect x="181" y="151" width="28" height="44" rx="2" fill="#555" stroke="#999" stroke-width="1.5"/>
  <text x="195" y="208" text-anchor="middle" fill="#ccc" font-size="10">F₁</text>

  <rect x="214" y="161" width="28" height="34" rx="2" fill="#555" stroke="#999" stroke-width="1.5"/>
  <text x="228" y="208" text-anchor="middle" fill="#ccc" font-size="10">F₂</text>

  <rect x="247" y="171" width="28" height="24" rx="2" fill="#555" stroke="#999" stroke-width="1.5"/>
  <text x="261" y="208" text-anchor="middle" fill="#ccc" font-size="10">F₃</text>

  <rect x="285" y="187" width="28" height="8" rx="2" fill="#3a3a3a" stroke="#777" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="299" y="208" text-anchor="middle" fill="#777" font-size="10">C₁</text>

  <rect x="318" y="189" width="28" height="6" rx="2" fill="#3a3a3a" stroke="#777" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="332" y="208" text-anchor="middle" fill="#777" font-size="10">C₂</text>

  <rect x="351" y="190" width="28" height="5" rx="2" fill="#3a3a3a" stroke="#777" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="365" y="208" text-anchor="middle" fill="#777" font-size="10">C₃</text>

  <!-- ✓/✗ markers -->
  <text x="195" y="224" text-anchor="middle" fill="#2978b5" font-size="14" font-weight="600">✓</text>
  <text x="228" y="224" text-anchor="middle" fill="#2978b5" font-size="14" font-weight="600">✓</text>
  <text x="261" y="224" text-anchor="middle" fill="#2978b5" font-size="14" font-weight="600">✓</text>
  <text x="299" y="224" text-anchor="middle" fill="#e67e22" font-size="14" font-weight="600">✗</text>
  <text x="332" y="224" text-anchor="middle" fill="#e67e22" font-size="14" font-weight="600">✗</text>
  <text x="365" y="224" text-anchor="middle" fill="#e67e22" font-size="14" font-weight="600">✗</text>

  <!-- Monitoring gate -->
  <line x1="160" y1="232" x2="400" y2="232" stroke="#2978b5" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="280" y="246" text-anchor="middle" fill="#2978b5" font-size="11" font-weight="500">context monitoring — reject mismatches</text>

  <!-- Result -->
  <rect x="165" y="260" width="230" height="28" rx="4" fill="none" stroke="#ecf0f1" stroke-width="1.5"/>
  <text x="280" y="279" text-anchor="middle" fill="#ecf0f1" font-size="11" font-weight="500">Protected recall</text>

  <!-- ========== RIGHT PANEL — Involuntary ========== -->

  <!-- Spotlight -->
  <rect x="710" y="106" width="220" height="22" rx="11" fill="#999" opacity="0.15" stroke="#999" stroke-width="1"/>
  <text x="820" y="120" text-anchor="middle" fill="#999" font-size="10">Post-interference context</text>

  <!-- Arrow down -->
  <line x1="820" y1="128" x2="820" y2="144" stroke="#999" stroke-width="1.2"/>
  <polygon points="816,144 820,152 824,144" fill="#999"/>

  <!-- Activation bars — overlap-centered gradient -->
  <!-- F₁:x=721 F₂:x=754 F₃:x=787 | C₁:x=825 C₂:x=858 C₃:x=891 -->
  <!-- Baseline y=195. F₃≈C₁ (closest to overlap zone) -->

  <rect x="721" y="175" width="28" height="20" rx="2" fill="#555" stroke="#999" stroke-width="1"/>
  <text x="735" y="208" text-anchor="middle" fill="#ccc" font-size="10">F₁</text>

  <rect x="754" y="169" width="28" height="26" rx="2" fill="#555" stroke="#999" stroke-width="1"/>
  <text x="768" y="208" text-anchor="middle" fill="#ccc" font-size="10">F₂</text>

  <rect x="787" y="163" width="28" height="32" rx="2" fill="#555" stroke="#999" stroke-width="1"/>
  <text x="801" y="208" text-anchor="middle" fill="#ccc" font-size="10">F₃</text>

  <rect x="825" y="161" width="28" height="34" rx="2" fill="#e67e22" stroke="#d35400" stroke-width="1"/>
  <text x="839" y="208" text-anchor="middle" fill="#e67e22" font-size="10">C₁</text>

  <rect x="858" y="167" width="28" height="28" rx="2" fill="#e67e22" stroke="#d35400" stroke-width="1"/>
  <text x="872" y="208" text-anchor="middle" fill="#e67e22" font-size="10">C₂</text>

  <rect x="891" y="173" width="28" height="22" rx="2" fill="#e67e22" stroke="#d35400" stroke-width="1"/>
  <text x="905" y="208" text-anchor="middle" fill="#e67e22" font-size="10">C₃</text>

  <!-- No-gate parallel -->
  <line x1="700" y1="232" x2="940" y2="232" stroke="#666" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="820" y="246" text-anchor="middle" fill="#666" font-size="9">no post-retrieval filtering</text>

  <!-- Result -->
  <rect x="705" y="260" width="230" height="28" rx="4" fill="none" stroke="#e67e22" stroke-width="1.5"/>
  <text x="820" y="279" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="500">Competition → impaired recall</text>

</svg>
